services:
  postgres:
    image: postgres:16-alpine
    container_name: prompt2app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: prompt2app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - prompt2app_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d prompt2app"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  prompt2app_pgdata:
